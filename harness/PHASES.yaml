phases:
  - id: phase_0
    name: governance_and_skeleton
    status: active
    objectives:
      - establish_repository_layout
      - define_engineering_principles
      - define_initial_harness_artifacts
      - verify_required_toolchains
    required_artifacts:
      - KOJI_ENGINEERING_PRINCIPLES.md
      - README.md
      - docs/architecture/overview.md
      - docs/roadmaps/bootstrap_plan.md
      - harness/PHASES.yaml
      - harness/templates/task.md
      - harness/templates/adr.md
      - harness/checklists/review.md
      - verify/env_odin.sh
      - verify/env_nasm.sh
      - verify/env_go.sh
      - verify/env_qemu.sh
      - Makefile
    acceptance_checks:
      - make verify_env
    forbidden_changes:
      - kernel/**/*
      - substrate/**/*
      - compat/**/*
