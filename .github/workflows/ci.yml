name: KOJI CI

on:
  pull_request:
    paths:
      - "kernel/**"
      - "abi/**"
      - "scripts/**"
      - "tests/**"
      - "Makefile"
      - ".github/workflows/**"
  push:
    branches:
      - main
      - master
    paths:
      - "kernel/**"
      - "abi/**"
      - "scripts/**"
      - "tests/**"
      - "Makefile"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: koji-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  kernel-proof-gate:
    name: Build, validate, and prove invariants
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then pip install -r requirements.txt; fi
          if [[ -f requirements-dev.txt ]]; then pip install -r requirements-dev.txt; fi

      - name: Install system toolchain
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            lld \
            llvm \
            nasm \
            build-essential \
            curl \
            unzip \
            ca-certificates

      - name: Cache Odin toolchain
        uses: actions/cache@v5
        with:
          path: ~/.cache/odin
          key: odin-${{ runner.os }}-${{ runner.arch }}-dev-2026-03-v1

      - name: Install Odin
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p ~/.cache/odin
          if [[ ! -x ~/.cache/odin/odin ]]; then
            ODIN_VERSION="dev-2026-03"
            ODIN_BASE_URL="https://github.com/odin-lang/Odin/releases/download/${ODIN_VERSION}"
            ODIN_ASSET=""
            for candidate in \
              "odin-linux-amd64.zip" \
              "odin-linux-x86_64.zip"
            do
              if curl -fLSs "${ODIN_BASE_URL}/${candidate}" -o /tmp/odin.zip; then
                ODIN_ASSET="${candidate}"
                break
              fi
            done

            if [[ -z "${ODIN_ASSET}" ]]; then
              echo "Failed to download Odin release asset for ${ODIN_VERSION}" >&2
              exit 1
            fi

            rm -rf /tmp/odin-extract
            mkdir -p /tmp/odin-extract
            unzip -q /tmp/odin.zip -d /tmp/odin-extract

            ODIN_BIN="$(find /tmp/odin-extract -type f -name odin | head -n 1)"
            if [[ -z "${ODIN_BIN}" ]]; then
              echo "Failed to locate Odin binary after extraction" >&2
              exit 1
            fi
            ODIN_ROOT="$(dirname "$ODIN_BIN")"

            cp -R "$ODIN_ROOT"/. ~/.cache/odin/
            chmod +x ~/.cache/odin/odin
          fi

          echo "$HOME/.cache/odin" >> "$GITHUB_PATH"
          odin version

      - name: Verify required tools
        shell: bash
        run: |
          set -euxo pipefail
          command -v python3
          command -v odin
          command -v ld.lld
          command -v llvm-nm
          python3 --version
          odin version
          ld.lld --version
          llvm-nm --version

      - name: Canonical build gate
        shell: bash
        run: |
          set -euxo pipefail
          make all

      - name: Repository validation gate
        shell: bash
        run: |
          set -euxo pipefail
          python3 scripts/validate.py

      - name: Focused invariant gate
        shell: bash
        run: |
          set -euxo pipefail
          make test

      - name: Direct Odin invariant run
        shell: bash
        run: |
          set -euxo pipefail
          odin run tests/cnode_test.odin -file
