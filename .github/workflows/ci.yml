name: KOJI CI

on:
  pull_request:
    paths:
      - "kernel/**"
      - "abi/**"
      - "scripts/**"
      - "tests/**"
      - "Makefile"
      - ".github/workflows/**"
  push:
    branches:
      - main
      - master
    paths:
      - "kernel/**"
      - "abi/**"
      - "scripts/**"
      - "tests/**"
      - "Makefile"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: koji-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  kernel-proof-gate:
    name: Build, validate, and prove invariants
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then pip install -r requirements.txt; fi
          if [[ -f requirements-dev.txt ]]; then pip install -r requirements-dev.txt; fi

      - name: Install system toolchain
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            lld \
            llvm \
            nasm \
            build-essential \
            curl \
            unzip \
            ca-certificates

      - name: Install Odin
        shell: bash
        run: |
          set -euxo pipefail
          # Pinned to a known-good upstream Odin commit for deterministic CI behavior.
          ODIN_COMMIT_SHA="c937d38db2b31b885256b9aac0d606032f6c5343"
          ODIN_REPO_URL="https://github.com/odin-lang/Odin.git"
          rm -rf /tmp/odin-src
          git clone "${ODIN_REPO_URL}" /tmp/odin-src
          cd /tmp/odin-src
          git checkout --detach "${ODIN_COMMIT_SHA}"
          make release-native

          sudo mkdir -p /usr/local/lib/odin /usr/local/bin
          sudo cp -R /tmp/odin-src/. /usr/local/lib/odin/
          sudo ln -sf /usr/local/lib/odin/odin /usr/local/bin/odin
          sudo chmod +x /usr/local/lib/odin/odin

          odin version

      - name: Verify required tools
        shell: bash
        run: |
          set -euxo pipefail
          command -v python3
          command -v odin
          command -v nasm
          command -v ld.lld
          command -v llvm-nm
          python3 --version
          odin version
          nasm -v
          ld.lld --version
          llvm-nm --version

      - name: Focused invariant gate
        shell: bash
        run: |
          set -euxo pipefail
          make test

      - name: Canonical build gate
        shell: bash
        run: |
          set -euxo pipefail
          make all

      - name: Direct Odin invariant run
        shell: bash
        run: |
          set -euxo pipefail
          odin run tests/cnode_test.odin -file

      - name: Repository validation gate
        shell: bash
        run: |
          set -euxo pipefail
          if [[ -f scripts/validate.py ]]; then
            python3 scripts/validate.py
          else
            echo "scripts/validate.py not present; skipping validation gate"
          fi
